<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .login-container { height: 100vh; display: flex; align-items: center; justify-content: center; background: #f0f2f5; }
        .login-card { width: 100%; max-width: 400px; padding: 30px; }
    </style>
</head>
<body class="login-container">
    <div class="card login-card shadow">
        <div class="text-center mb-4">
            <h3>Login to Portal</h3>
            <p class="text-muted">Enter your credentials to continue</p>
        </div>
        <form>
            <div class="mb-3">
                <label class="form-label">Username / Roll No</label>
                <input type="text" class="form-control" placeholder="e.g. 1MS21CS001">
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Sign In</button>
        </form>
    </div>
</body>
</html>
