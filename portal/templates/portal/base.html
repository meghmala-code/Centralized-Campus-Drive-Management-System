<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CareerFlow Portal{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --han-purple: #5218FA;
            --kobi: #E79FC4;
            --maximum-yellow: #FAEF32;
            --middle-blue: #7ED4E6;
            --ruby: #E0115F;
            --white: #FFFFFF;
            --bg-light: #F8F9FB; 
        }

        body { font-family: 'Outfit', sans-serif; background-color: var(--bg-light); color: #2d3436; }

        /* --- Sidebar --- */
        .sidebar { background-color: var(--white); min-height: 100vh; border-right: 2px solid rgba(126, 212, 230, 0.2); padding-top: 20px; }
        .sidebar-brand { font-weight: 800; font-size: 1.5rem; color: var(--han-purple); text-decoration: none; padding: 0 20px; display: block; margin-bottom: 30px; }
        .sidebar-brand span { color: var(--ruby); }
        .nav-link { color: #6c757d; font-weight: 500; padding: 12px 25px; margin: 5px 15px; border-radius: 10px; transition: all 0.3s; }
        .nav-link:hover { color: var(--han-purple); background-color: rgba(82, 24, 250, 0.05); }
        .nav-link.active { background-color: var(--maximum-yellow); color: #333; box-shadow: 0 4px 10px rgba(250, 239, 50, 0.3); font-weight: 700; }

        /* --- Cards & Metrics --- */
        .card { border: none; background-color: var(--white); border-radius: 16px !important; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .metric-card { padding: 20px; border-radius: 16px; background-color: var(--white); box-shadow: 0 4px 20px rgba(0,0,0,0.03); border-bottom: 4px solid var(--han-purple); transition: transform 0.2s; height: 100%; }
        .metric-card:hover { transform: translateY(-5px); }
        .metric-card.card-ruby { border-bottom-color: var(--ruby); }
        .metric-card.card-blue { border-bottom-color: var(--middle-blue); }
        .metric-card.card-kobi { border-bottom-color: var(--kobi); }
        .metric-card.card-yellow { border-bottom-color: var(--maximum-yellow); }
        .metric-card .lbl { font-size: 13px; color: #6c757d; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; }
        .metric-card .val { font-size: 2.2rem; font-weight: 800; color: var(--han-purple); margin-top: 5px; line-height: 1.1; }
        
        .metric-mini { padding: 15px 20px; border-radius: 12px; display: flex; align-items: center; gap: 15px; }
        .metric-mini-icon { width: 45px; height: 45px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        /* --- Tables --- */
        .table { vertical-align: middle; margin-bottom: 0; }
        .table thead th { background-color: var(--bg-light); color: var(--han-purple); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: none; padding: 15px; font-weight: 700; }
        .table tbody td { padding: 15px; border-bottom: 1px solid #f0f0f0; }
        .table tbody tr:last-child td { border-bottom: none; }
        .table-hover tbody tr:hover { background-color: rgba(126, 212, 230, 0.05); }
        .table-borderless th { color: #adb5bd; padding-bottom: 15px; }
        .table-borderless td { padding: 12px 8px; border-bottom: 1px solid #f8f9fa; }

        /* --- Forms & Search --- */
        .search-form .form-control { border-radius: 8px 0 0 8px; border: 2px solid #f0f0f0; border-right: none; padding: 10px 15px; box-shadow: none; font-family: inherit; }
        .search-form .form-control:focus { border-color: var(--han-purple); background-color: var(--white); }
        .search-form .btn { border-radius: 0 8px 8px 0; background-color: var(--han-purple); color: white; border: 2px solid var(--han-purple); padding: 10px 20px; font-weight: 600; transition: 0.3s; }
        .search-form .btn:hover { background-color: var(--ruby); border-color: var(--ruby); }
        
        form input, form select, form textarea { width: 100%; padding: 14px 15px; border-radius: 10px; border: 2px solid #f0f0f0; font-family: inherit; transition: all 0.3s ease; background-color: #fafafa; color: #2d3436; font-weight: 500; }
        form input:focus, form select:focus, form textarea:focus { border-color: var(--middle-blue); background-color: var(--white); outline: none; box-shadow: 0 0 0 4px rgba(126, 212, 230, 0.15); }
        .form-label { font-size: 12px; color: var(--han-purple); text-transform: uppercase; letter-spacing: .05em; font-weight: 700; margin-bottom: 8px; }

        /* --- Badges, Avatars & Progress --- */
        .badge-status { padding: 6px 12px; font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase; font-size: 11px; }
        .bg-active { background-color: rgba(126, 212, 230, 0.2); color: #0d5c6b; border: 1px solid var(--middle-blue); }
        .bg-draft, .bg-pending { background-color: rgba(250, 239, 50, 0.2); color: #857b0a; border: 1px solid var(--maximum-yellow); }
        .bg-closed, .bg-unplaced { background-color: #f1f3f5; color: #6c757d; border: 1px solid #dee2e6; }
        .bg-verified { background-color: rgba(126, 212, 230, 0.2); color: #0d5c6b; border: 1px solid var(--middle-blue); }
        .bg-blacklisted { background-color: rgba(224, 17, 95, 0.1); color: var(--ruby); border: 1px solid var(--ruby); }
        .bg-placed { background-color: rgba(126, 212, 230, 0.2); color: #0d5c6b; border: 1px solid var(--middle-blue); }
        
        .progress { background-color: rgba(126, 212, 230, 0.15); border-radius: 50px; overflow: hidden; }
        .bg-purple-bar { background-color: var(--han-purple); }
        .bg-blue-bar, .bg-placed-bar { background-color: var(--middle-blue); color: #0d5c6b; font-weight: 700; }
        .bg-ruby-bar, .bg-unplaced-bar { background-color: var(--ruby); color: white; font-weight: 700; }
        .bg-kobi-bar { background-color: var(--kobi); }
        
        .avatar { width: 35px; height: 35px; font-size: 12px; color: var(--han-purple); background-color: rgba(82, 24, 250, 0.1); }
        .company-logo { width: 40px; height: 40px; font-size: 16px; color: var(--han-purple); background-color: rgba(82, 24, 250, 0.1); border-radius: 10px; }
        .legend-dot { display: inline-block; width: 12px; height: 12px; border-radius: 3px; margin-right: 5px; }

        /* --- Buttons --- */
        .btn-action { width: 32px; height: 32px; padding: 0; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 14px; transition: 0.2s; border: 1px solid transparent; }
        .btn-approve { color: var(--middle-blue); background: rgba(126, 212, 230, 0.1); border-color: var(--middle-blue); }
        .btn-approve:hover { background: var(--middle-blue); color: white; }
        .btn-reject { color: var(--ruby); background: rgba(224, 17, 95, 0.1); border-color: var(--ruby); }
        .btn-reject:hover { background: var(--ruby); color: white; }
        .btn-view { color: var(--han-purple); background: transparent; border-color: var(--han-purple); }
        .btn-view:hover { background: var(--han-purple); color: white; }
        
        .btn-outline-cv { color: #0d5c6b; border: 1px solid var(--middle-blue); background: rgba(126, 212, 230, 0.1); font-weight: 600; border-radius: 8px; padding: 5px 12px; font-size: 12px; transition: 0.2s; }
        .btn-outline-cv:hover { background: var(--middle-blue); color: white; }
        
        .btn-primary-custom { background-color: var(--han-purple); color: white; border: none; padding: 12px 24px; font-weight: 700; border-radius: 10px; transition: 0.3s; }
        .btn-primary-custom:hover { background-color: var(--ruby); color: white; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(224, 17, 95, 0.2); }
        .btn-outline-custom { color: #6c757d; border: 2px solid #e9ecef; background-color: transparent; padding: 12px 24px; font-weight: 600; border-radius: 10px; transition: 0.3s; text-align: center; text-decoration: none; }
        .btn-outline-custom:hover { border-color: #adb5bd; color: #495057; background-color: #f8f9fa; }

        .job-context-box { background-color: rgba(231, 159, 196, 0.1); border-left: 4px solid var(--kobi); border-radius: 12px; padding: 20px; margin-bottom: 25px; }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

<div class="container-fluid p-0">
    <div class="row g-0">
        <div class="col-md-3 col-lg-2 d-none d-md-block sidebar shadow-sm">
            {% block sidebar %}{% endblock %}
        </div>

        <div class="col-md-9 col-lg-10 p-4 p-md-5">
            {% block content %}{% endblock %}
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
