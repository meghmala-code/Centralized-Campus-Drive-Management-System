<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruiter Registration | CareerFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --han-purple: #5218FA;
            --kobi: #E79FC4;
            --maximum-yellow: #FAEF32;
            --middle-blue: #7ED4E6;
            --ruby: #E0115F;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--white);
            color: #2d3436;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar Style from Home Page */
        .navbar {
            background: var(--white);
            border-bottom: 3px solid var(--middle-blue);
        }
        .navbar-brand {
            font-weight: 800;
            color: var(--han-purple) !important;
        }

        /* Card Styling */
        .card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
        }
        .card-header {
            background-color: var(--han-purple) !important;
            border-bottom: 5px solid var(--kobi);
        }
        
        .form-label {
            font-weight: 500;
            color: var(--han-purple);
        }

        .form-control {
            border-radius: 10px;
            border: 2px solid #f0f0f0;
            padding: 12px;
        }

        .form-control:focus {
            border-color: var(--middle-blue);
            box-shadow: none;
        }

        /* Button Styling */
        .btn-register {
            background-color: var(--ruby);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn-register:hover {
            background-color: var(--han-purple);
            transform: translateY(-2px);
            color: white;
        }

        .alert-custom {
            background-color: rgba(126, 212, 230, 0.1);
            border: 1px solid var(--middle-blue);
            border-radius: 12px;
            color: #444;
        }

        a {
            color: var(--ruby);
            text-decoration: none;
            font-weight: 600;
        }

        a:hover {
            color: var(--han-purple);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg mb-5">
        <div class="container">
            <a class="navbar-brand" href="home.html"><i class="fas fa-bolt me-2"></i>Career<span>Flow</span></a>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-lg mt-4">
                    <div class="card-header text-white text-center py-4">
                        <h4 class="mb-0"><i class="fas fa-building me-2"></i>Recruiter Registration</h4>
                        <p class="small mb-0 opacity-75">Connect your company with top-tier talent</p>
                    </div>
                    <div class="card-body p-4 p-lg-5">
                        <form method="POST" action="">
                            {% csrf_token %}
                            <div class="row">
                                <div class="col-md-12 mb-4">
                                    <label class="form-label">Company Name</label>
                                    <input type="text" class="form-control" name="company_name" placeholder="e.g. Google, Microsoft, StartupX" required>
                                </div>
                                
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">HR Name</label>
                                    <input type="text" class="form-control" name="hr_name" placeholder="Contact Person Name" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Designation</label>
                                    <input type="text" class="form-control" name="designation" placeholder="e.g. Talent Acquisition Manager">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Official Email</label>
                                    <input type="email" class="form-control" name="email" placeholder="hr@company.com" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Company Website</label>
                                    <input type="url" class="form-control" name="website" placeholder="https://www.company.com">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Password</label>
                                    <input type="password" class="form-control" name="password" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Confirm Password</label>
                                    <input type="password" class="form-control" name="confirm_password" required>
                                </div>
                            </div>

                            <div class="alert alert-custom mt-4">
                                <small><i class="fas fa-info-circle me-1" style="color: var(--han-purple)"></i> <strong>Note:</strong> Your account will be active once the College Placement Admin verifies your company details.</small>
                            </div>
                            
                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-register btn-lg">Register Company</button>
                            </div>

                            <div class="text-center mt-4">
                                <span class="text-muted">Looking for a student registration?</span><br>
                                <a href="{% url 'register_student' %}">Register as Student</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-auto py-4 text-center">
        <p class="small text-muted mb-0">&copy; 2026 CareerFlow Placement Portal</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
