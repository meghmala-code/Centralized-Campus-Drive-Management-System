{% extends 'portal/base.html' %}

{% block sidebar %}
<a href="{% url 'home' %}" class="sidebar-brand">
    <i class="fas fa-bolt me-2"></i>Career<span>Flow</span>
</a>

<div class="d-flex flex-column">
    <div class="px-4 mb-3" style="font-size: 12px; font-weight: 800; color: var(--han-purple); text-transform: uppercase; letter-spacing: 0.05em;">Admin Portal</div>
    
    <a href="{% url 'admin_dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}">
        <i class="fas fa-chart-line me-2"></i> Dashboard
    </a>
    
    <a href="{% url 'admin_students' %}" class="nav-link {% if request.resolver_match.url_name == 'admin_students' %}active{% endif %}">
        <i class="fas fa-user-graduate me-2"></i> Students
    </a>
    
    <a href="{% url 'admin_companies' %}" class="nav-link {% if request.resolver_match.url_name == 'admin_companies' %}active{% endif %}">
        <i class="fas fa-building me-2"></i> Companies
    </a>
    
    <a href="{% url 'admin_reports' %}" class="nav-link {% if request.resolver_match.url_name == 'admin_reports' %}active{% endif %}">
        <i class="fas fa-chart-pie me-2"></i> Reports
    </a>
    
    <hr class="mx-3 my-4 opacity-25">
    
    <a href="/admin/" class="nav-link text-secondary" target="_blank">
        <i class="fas fa-cog me-2"></i> Django Admin
    </a>
    
    <a href="{% url 'logout' %}" class="nav-link text-danger">
        <i class="fas fa-sign-out-alt me-2"></i> Logout
    </a>
</div>
{% endblock %}
