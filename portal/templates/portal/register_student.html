<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration | CareerFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --han-purple: #5218FA;
            --kobi: #E79FC4;
            --maximum-yellow: #FAEF32;
            --middle-blue: #7ED4E6;
            --ruby: #E0115F;
            --white: #FFFFFF;
            --bg-light: #F8F9FB; 
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-light);
            color: #2d3436;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
        }

        /* --- Brand --- */
        .brand-logo {
            font-weight: 800;
            font-size: 1.8rem;
            color: var(--han-purple);
            text-decoration: none;
            display: inline-block;
            margin-bottom: 10px;
        }
        .brand-logo span { color: var(--ruby); }

        /* --- Auth Card --- */
        .auth-card {
            border: none;
            background-color: var(--white);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04);
            overflow: hidden;
        }

        .auth-header {
            background: linear-gradient(135deg, rgba(82, 24, 250, 0.05) 0%, rgba(126, 212, 230, 0.1) 100%);
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid rgba(0,0,0,0.03);
        }

        /* --- Form Inputs --- */
        .form-label {
            font-size: 12px;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: .05em;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .form-control, .form-select {
            padding: 12px 15px;
            border-radius: 10px;
            border: 2px solid #f0f0f0;
            background-color: #fafafa;
            font-family: inherit;
            font-weight: 500;
            color: #2d3436;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--middle-blue);
            background-color: var(--white);
            outline: none;
            box-shadow: 0 0 0 4px rgba(126, 212, 230, 0.15);
        }

        /* --- Button --- */
        .btn-primary-custom {
            background-color: var(--han-purple);
            color: white;
            border: none;
            padding: 14px 24px;
            font-weight: 700;
            border-radius: 10px;
            transition: 0.3s;
            width: 100%;
            font-size: 1.1rem;
        }
        .btn-primary-custom:hover {
            background-color: var(--ruby);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(224, 17, 95, 0.2);
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            
            <div class="auth-card">
                <div class="auth-header">
                    <a href="{% url 'home' %}" class="brand-logo">
                        <i class="fas fa-bolt me-2"></i>Career<span>Flow</span>
                    </a>
                    <h4 class="fw-bold text-dark mt-2 mb-1">Create Student Account</h4>
                    <p class="text-muted small mb-0">Join the portal to apply for campus drives.</p>
                </div>

                <div class="card-body p-4 p-md-5">
                    
                    <form method="post" action="#">
                        {% csrf_token %}
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">First Name</label>
                                <input type="text" class="form-control" placeholder="e.g. Rahul">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Last Name</label>
                                <input type="text" class="form-control" placeholder="e.g. Sharma">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Roll Number (USN)</label>
                                <input type="text" class="form-control" placeholder="e.g. 1MS21CS001">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Branch</label>
                                <select class="form-select">
                                    <option value="" disabled selected>Select branch...</option>
                                    <option value="CSE">Computer Science (CSE)</option>
                                    <option value="ISE">Information Science (ISE)</option>
                                    <option value="ECE">Electronics (ECE)</option>
                                    <option value="ME">Mechanical (ME)</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">College Email Address</label>
                            <input type="email" class="form-control" placeholder="your.name@college.edu">
                            <div class="form-text small text-muted mt-1"><i class="fas fa-info-circle me-1"></i> Please use your official university email.</div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" placeholder="Create password">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Confirm Password</label>
                                <input type="password" class="form-control" placeholder="Repeat password">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary-custom mb-3">
                            Register Account <i class="fas fa-arrow-right ms-2"></i>
                        </button>

                        <div class="text-center mt-4">
                            <p class="text-muted small fw-medium mb-0">
                                Already have an account? <a href="{% url 'login' %}" class="text-decoration-none fw-bold" style="color: var(--han-purple);">Login here</a>
                            </p>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
