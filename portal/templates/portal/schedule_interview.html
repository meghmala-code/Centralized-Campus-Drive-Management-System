<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Interview | CareerFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --han-purple: #5218FA;
            --kobi: #E79FC4;
            --maximum-yellow: #FAEF32;
            --middle-blue: #7ED4E6;
            --ruby: #E0115F;
            --white: #FFFFFF;
            --bg-light: #F8F9FB; 
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-light);
            color: #2d3436;
        }

        /* --- Sidebar Navigation --- */
        .sidebar {
            background-color: var(--white);
            min-height: 100vh;
            border-right: 2px solid rgba(126, 212, 230, 0.2);
            padding-top: 20px;
        }
        .sidebar-brand {
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--han-purple);
            text-decoration: none;
            padding: 0 20px;
            display: block;
            margin-bottom: 30px;
        }
        .sidebar-brand span { color: var(--ruby); }
        
        .nav-link {
            color: #6c757d;
            font-weight: 500;
            padding: 12px 25px;
            margin: 5px 15px;
            border-radius: 10px;
            transition: all 0.3s;
        }
        .nav-link:hover {
            color: var(--han-purple);
            background-color: rgba(82, 24, 250, 0.05);
        }
        .nav-link.active {
            background-color: var(--han-purple);
            color: var(--white);
            box-shadow: 0 4px 10px rgba(82, 24, 250, 0.3);
        }

        /* --- Cards & General UI --- */
        .card {
            border: none;
            background-color: var(--white);
            border-radius: 16px !important;
            box-shadow: 0 4px 25px rgba(0,0,0,0.04);
        }

        .job-context-box {
            background-color: rgba(231, 159, 196, 0.1); /* Light Kobi */
            border-left: 4px solid var(--kobi);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }

        /* --- Auto-styling for Django forms --- */
        form input, form select, form textarea {
            width: 100%;
            padding: 14px 15px;
            border-radius: 10px;
            border: 2px solid #f0f0f0;
            font-family: inherit;
            transition: all 0.3s ease;
            background-color: #fafafa;
            color: #2d3436;
            font-weight: 500;
        }

        form input:focus, form select:focus, form textarea:focus {
            border-color: var(--middle-blue);
            background-color: var(--white);
            outline: none;
            box-shadow: 0 0 0 4px rgba(126, 212, 230, 0.15);
        }

        .form-label {
            font-size: 12px;
            color: var(--han-purple);
            text-transform: uppercase;
            letter-spacing: .05em;
            font-weight: 700;
            margin-bottom: 8px;
        }

        /* --- Buttons --- */
        .btn-primary-custom {
            background-color: var(--han-purple);
            color: white;
            border: none;
            padding: 12px 24px;
            font-weight: 700;
            border-radius: 10px;
            transition: 0.3s;
        }
        .btn-primary-custom:hover {
            background-color: var(--ruby);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(224, 17, 95, 0.2);
        }

        .btn-outline-custom {
            color: #6c757d;
            border: 2px solid #e9ecef;
            background-color: transparent;
            padding: 12px 24px;
            font-weight: 600;
            border-radius: 10px;
            transition: 0.3s;
            text-align: center;
            text-decoration: none;
        }
        .btn-outline-custom:hover {
            border-color: #adb5bd;
            color: #495057;
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>

<div class="container-fluid p-0">
    <div class="row g-0">
        <div class="col-md-3 col-lg-2 d-none d-md-block sidebar shadow-sm">
    <a href="{% url 'home' %}" class="sidebar-brand">
        <i class="fas fa-bolt me-2"></i>Career<span>Flow</span>
    </a>
    
    <div class="d-flex flex-column">
        <div class="px-4 mb-3" style="font-size: 12px; font-weight: 800; color: var(--han-purple); text-transform: uppercase; letter-spacing: 0.05em;">Admin Portal</div>
        
        <a href="{% url 'admin_dashboard' %}" class="nav-link">
            <i class="fas fa-chart-line me-2"></i> Dashboard
        </a>
        
        <a href="{% url 'admin_students' %}" class="nav-link">
            <i class="fas fa-user-graduate me-2"></i> Students
        </a>
        
        <a href="{% url 'admin_companies' %}" class="nav-link">
            <i class="fas fa-building me-2"></i> Companies
        </a>

        <a href="{% url 'schedule_interview' %}" class="nav-link active">
            <i class="fas fa-calendar-alt me-2"></i> Schedule Rounds
        </a>
        
        <a href="{% url 'admin_reports' %}" class="nav-link">
            <i class="fas fa-chart-pie me-2"></i> Reports
        </a>
        
        <hr class="mx-3 my-4 opacity-25">
        
        <a href="/admin/" class="nav-link text-secondary" target="_blank">
            <i class="fas fa-cog me-2"></i> Django Admin
        </a>
        
        <a href="{% url 'login' %}" class="nav-link text-danger">
            <i class="fas fa-sign-out-alt me-2"></i> Logout
        </a>
    </div>
</div>

        <div class="col-md-9 col-lg-10 p-4 p-md-5">
            
            <div class="mb-4">
                <a href="candidates.html" class="text-muted text-decoration-none small fw-semibold mb-2 d-inline-block"><i class="fas fa-arrow-left me-1"></i> Back to Candidates</a>
                <h3 class="fw-bold mb-0 text-dark">Schedule Interview Round</h3>
            </div>

            <div class="row justify-content-center mt-4">
                <div class="col-md-9 col-lg-7">
                    <div class="card border-top border-5" style="border-top-color: var(--kobi) !important;">
                        <div class="card-body p-4 p-lg-5">
                            
                            <div class="job-context-box">
                                <h5 class="fw-bold mb-2 text-dark">Acme Corp <span class="fw-normal" style="color: var(--han-purple);">— Software Engineer Intern</span></h5>
                                <div class="text-muted small fw-medium">
                                    <i class="fas fa-rupee-sign me-1" style="color: var(--kobi)"></i> 12.0 LPA 
                                    <span class="mx-2">•</span> 
                                    <i class="far fa-calendar-alt me-1" style="color: var(--middle-blue)"></i> Drive Date: 20 May 2026
                                </div>
                            </div>

                            <form method="post">
                                
                                <div class="mb-4">
                                    <label class="form-label">Interview Type</label>
                                    <select class="form-select">
                                        <option value="" disabled selected>Select round type...</option>
                                        <option value="technical">Technical Round</option>
                                        <option value="hr">HR / Culture Fit</option>
                                        <option value="managerial">Managerial Round</option>
                                        <option value="group_discussion">Group Discussion</option>
                                    </select>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-4">
                                        <label class="form-label">Interview Date</label>
                                        <input type="date">
                                    </div>
                                    <div class="col-md-6 mb-4">
                                        <label class="form-label">Interview Time</label>
                                        <input type="time">
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label">Venue / Meeting Link</label>
                                    <input type="text" placeholder="e.g. Zoom Link or Room 304, CS Block">
                                </div>

                                <div class="mb-4">
                                    <label class="form-label">Instructions for Candidate (Optional)</label>
                                    <textarea rows="3" placeholder="e.g. Please join 5 minutes early and ensure a stable internet connection."></textarea>
                                </div>

                                <div class="d-flex gap-3 pt-2">
                                    <button type="submit" class="btn btn-primary-custom flex-fill"><i class="fas fa-paper-plane me-2"></i> Schedule & Notify</button>
                                    <a href="candidates.html" class="btn btn-outline-custom text-center" style="min-width: 120px;">Cancel</a>
                                </div>
                            </form>

                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
