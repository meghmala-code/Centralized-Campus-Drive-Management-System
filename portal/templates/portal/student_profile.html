<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | CareerFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --han-purple: #5218FA;
            --kobi: #E79FC4;
            --maximum-yellow: #FAEF32;
            --middle-blue: #7ED4E6;
            --ruby: #E0115F;
            --white: #FFFFFF;
            --bg-light: #F8F9FB; 
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-light);
            color: #2d3436;
        }

        /* --- Sidebar Navigation --- */
        .sidebar {
            background-color: var(--white);
            min-height: 100vh;
            border-right: 2px solid rgba(126, 212, 230, 0.2);
            padding-top: 20px;
        }
        .sidebar-brand {
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--han-purple);
            text-decoration: none;
            padding: 0 20px;
            display: block;
            margin-bottom: 30px;
        }
        .sidebar-brand span { color: var(--ruby); }
        
        .nav-link {
            color: #6c757d;
            font-weight: 500;
            padding: 12px 25px;
            margin: 5px 15px;
            border-radius: 10px;
            transition: all 0.3s;
        }
        .nav-link:hover {
            color: var(--han-purple);
            background-color: rgba(82, 24, 250, 0.05);
        }
        .nav-link.active {
            background-color: var(--han-purple);
            color: var(--white);
            box-shadow: 0 4px 10px rgba(82, 24, 250, 0.3);
        }

        /* --- Cards & General UI --- */
        .card {
            background-color: var(--white);
            border-radius: 16px !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border: none;
        }
        
        .avatar-circle {
            background: linear-gradient(135deg, var(--han-purple), var(--ruby));
            box-shadow: 0 4px 10px rgba(82, 24, 250, 0.2);
        }

        /* --- Auto-styling for Django forms --- */
        form input, form select, form textarea {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 2px solid #f0f0f0;
            font-family: inherit;
            transition: all 0.3s ease;
            background-color: #fafafa;
        }

        form input:focus, form select:focus, form textarea:focus {
            border-color: var(--middle-blue);
            background-color: var(--white);
            outline: none;
            box-shadow: 0 0 0 4px rgba(126, 212, 230, 0.15);
        }

        .form-label {
            font-size: 12px;
            color: var(--han-purple);
            text-transform: uppercase;
            letter-spacing: .05em;
            font-weight: 700;
        }

        /* --- Buttons & Badges --- */
        .btn-primary {
            background-color: var(--han-purple);
            border: none;
            padding: 12px;
            font-weight: 700;
            border-radius: 10px;
            transition: 0.3s;
        }
        .btn-primary:hover {
            background-color: var(--ruby);
            transform: translateY(-2px);
        }

        .btn-outline-primary {
            color: var(--han-purple);
            border: 2px solid var(--han-purple);
            font-weight: 600;
            border-radius: 10px;
        }
        .btn-outline-primary:hover {
            background-color: var(--han-purple);
            color: var(--white);
        }

        .skill-badge {
            background-color: rgba(126, 212, 230, 0.15);
            color: var(--han-purple);
            border: 1px solid var(--middle-blue);
            font-weight: 600;
            padding: 8px 15px;
            border-radius: 50px;
        }
    </style>
</head>
<body>

<div class="container-fluid p-0">
    <div class="row g-0">
        <div class="col-md-3 col-lg-2 d-none d-md-block sidebar shadow-sm">
    <a href="{% url 'home' %}" class="sidebar-brand">
        <i class="fas fa-bolt me-2"></i>Career<span>Flow</span>
    </a>
    
    <div class="d-flex flex-column">
        <div class="px-4 mb-3 text-muted" style="font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;">Student Portal</div>
        
        <a href="{% url 'student_dashboard' %}" class="nav-link">
            <i class="fas fa-th-large me-2"></i> Dashboard
        </a>
        
        <a href="{% url 'student_profile' %}" class="nav-link active">
            <i class="fas fa-user me-2"></i> My Profile
        </a>
        
        <a href="{% url 'drives_list' %}" class="nav-link">
            <i class="fas fa-briefcase me-2"></i> Browse Drives
        </a>
        
        <a href="{% url 'my_status' %}" class="nav-link">
            <i class="fas fa-clipboard-check me-2"></i> My Status
        </a>
        
        <hr class="mx-3 my-4 opacity-25">
        
        <a href="{% url 'login' %}" class="nav-link text-danger">
            <i class="fas fa-sign-out-alt me-2"></i> Logout
        </a>
    </div>
</div>
        <div class="col-md-9 col-lg-10 p-4 p-md-5">
            
            <h3 class="fw-bold mb-4 text-dark">Profile Settings</h3>

            <div class="row g-4">
                <div class="col-lg-7">
                    <div class="card p-2">
                        <div class="card-body p-4">
                            <div class="d-flex align-items-center gap-4 mb-5 pb-4 border-bottom">
                                <div class="avatar-circle rounded-circle d-flex align-items-center justify-content-center text-white fw-bold" style="width:70px; height:70px; font-size:24px">
                                    AD
                                </div>
                                <div>
                                    <div class="fw-bold fs-4 text-dark">Alex Doe</div>
                                    <div class="text-muted" style="font-weight: 500;">
                                        <i class="fas fa-id-card me-1" style="color: var(--kobi)"></i> 1MS21CS001 <span class="mx-2">•</span> 
                                        <i class="fas fa-laptop-code me-1" style="color: var(--middle-blue)"></i> Computer Science and Engineering
                                    </div>
                                </div>
                            </div>

                            <form method="post" enctype="multipart/form-data">
                                <div class="row">
                                    <div class="col-md-6 mb-4">
                                        <label class="form-label">First Name</label>
                                        <input type="text" value="Alex">
                                    </div>
                                    <div class="col-md-6 mb-4">
                                        <label class="form-label">Last Name</label>
                                        <input type="text" value="Doe">
                                    </div>
                                    <div class="col-md-6 mb-4">
                                        <label class="form-label">Contact Number</label>
                                        <input type="tel" value="+91 98765 43210">
                                    </div>
                                    <div class="col-md-6 mb-4">
                                        <label class="form-label">Current CGPA</label>
                                        <input type="number" step="0.01" value="8.75">
                                    </div>
                                    <div class="col-md-12 mb-4">
                                        <label class="form-label">GitHub / LeetCode Profile</label>
                                        <input type="url" placeholder="https://github.com/yourusername">
                                    </div>
                                    <div class="col-md-12 mb-4">
                                        <label class="form-label">Update Resume (PDF)</label>
                                        <input type="file" accept=".pdf">
                                    </div>
                                </div>
                                
                                <button type="submit" class="btn btn-primary w-100 mt-2">Save Profile Updates</button>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="col-lg-5">
                    
                    <div class="card mb-4 p-2 border-top border-5" style="border-top-color: var(--kobi) !important;">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h5 class="fw-bold mb-0 text-dark">Technical Skills</h5>
                                <button class="btn btn-sm btn-light rounded-circle"><i class="fas fa-pen text-muted"></i></button>
                            </div>
                            
                            <div class="d-flex flex-wrap gap-2 mt-3">
                                <span class="badge skill-badge">Java</span>
                                <span class="badge skill-badge">Data Structures</span>
                                <span class="badge skill-badge">Competitive Programming</span>
                                <span class="badge skill-badge">JavaScript</span>
                                <span class="badge skill-badge">HTML/CSS</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="card p-2 border-top border-5" style="border-top-color: var(--middle-blue) !important;">
                        <div class="card-body p-4 text-center">
                            <div class="mb-3">
                                <i class="fas fa-file-pdf" style="font-size: 3rem; color: var(--ruby);"></i>
                            </div>
                            <h5 class="fw-bold text-dark mb-1">Current Resume</h5>
                            <p class="text-muted small mb-4">Alex_Doe_Resume_2026.pdf</p>
                            
                            <a href="#" class="btn btn-outline-primary w-100"><i class="fas fa-eye me-2"></i> View Document</a>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
